services:
  transmission-cleaner:
    build: .
    image: transmission-cleaner:latest
    container_name: transmission-cleaner
    ports:
      - "${HOST_PORT:-8080}:8080"  # change HOST_PORT in .env to use a different host port
    volumes:
      - ./config:/config   # mount your servers.json here
    env_file:
      - stack.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
