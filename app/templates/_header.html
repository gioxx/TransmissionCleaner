<!-- Shared top bar -->
<header class="bg-white border-b border-slate-200 sticky top-0 z-10">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between gap-4">
    <div class="flex items-center gap-3">
      <a href="/" class="flex items-center gap-3 hover:opacity-75 transition-opacity">
        <span class="text-xl">🧹</span>
        <span class="font-semibold text-slate-900 text-lg">Transmission Cleaner</span>
      </a>
      {% if cfg.dry_run %}
      <span class="badge badge-yellow">DRY RUN</span>
      {% endif %}
    </div>
    <div class="flex items-center gap-6 text-sm text-slate-500">
      <div class="hidden sm:flex items-center gap-1.5">
        <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse inline-block"></span>
        Next run <span id="countdown" class="font-mono text-slate-700 ml-1">—</span>
      </div>
      <div class="hidden md:block">
        Last run: <span class="text-slate-700">{{ last_run_str }}</span>
      </div>
    </div>
  </div>
</header>
